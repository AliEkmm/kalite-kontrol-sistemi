<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonuç · Görsel Kalite Kontrol</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand mb-0 h1">🔍 Görsel Kalite Kontrol Sistemi</span>
      <span class="navbar-text text-white-50">Analiz Sonucu</span>
    </div>
  </nav>

  <div class="container py-5">

    <!-- Karar rozeti -->
    <div class="text-center mb-4">
      {% if is_anomaly %}
        <span class="badge bg-danger fs-4 px-4 py-2">⚠ ANOMALİ TESPİT EDİLDİ</span>
      {% else %}
        <span class="badge bg-success fs-4 px-4 py-2">✓ NORMAL</span>
      {% endif %}
    </div>

    <!-- Skor göstergesi -->
    <div class="row justify-content-center mb-4">
      <div class="col-md-6">
        <label class="form-label">
          Anomali skoru: <strong>{{ score_pct }}%</strong>
          <span class="text-muted small">(yüksek = daha şüpheli)</span>
        </label>
        <div class="progress" style="height: 22px;">
          <div class="progress-bar {{ 'bg-danger' if is_anomaly else 'bg-success' }}"
               role="progressbar"
               style="width: {{ score_pct }}%;">
            {{ score_pct }}%
          </div>
        </div>
      </div>
    </div>

    <!-- Görüntü karşılaştırması -->
    <div class="row justify-content-center g-4">
      <div class="col-md-5">
        <div class="card shadow-sm h-100">
          <div class="card-header text-center fw-bold">Yüklenen Görüntü</div>
          <div class="card-body text-center">
            <img src="{{ uploaded_url }}" class="img-fluid rounded" alt="Yüklenen görüntü">
          </div>
        </div>
      </div>
      <div class="col-md-5">
        <div class="card shadow-sm h-100">
          <div class="card-header text-center fw-bold">Isı Haritası (Heatmap)</div>
          <div class="card-body text-center">
            <img src="{{ heatmap_url }}" class="img-fluid rounded" alt="Anomali ısı haritası">
            <p class="text-muted small mt-2 mb-0">
              Kırmızı bölgeler modelin "anormal" gördüğü alanlardır.
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center mt-5">
      <a href="{{ url_for('index') }}" class="btn btn-outline-primary">
        ← Yeni görüntü analiz et
      </a>
    </div>
  </div>
</body>
</html>
